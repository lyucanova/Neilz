general:
  height-below: 32
  height-above: 48
  protect-blocks-from-explosions: true
  allow-pvp-inside-zones: false
  core-pulse-damage: 2.0
  max-members-per-region: 20
  home:
    scan-up: 48
  max-regions:
    default: 3
    vip: 6
    vip-permission: "protectionstones.vip"
  actionbar:
    cooldown-ticks: 25
  outline:
    mode: "LINES" # LINES, PARTICLES or FAKE_BLOCKS
    duration-ticks: 80
    preview-interval-ticks: 6
    preview-distance: 6
    step: 4
    spacing: 0.85
    particle-size: 1.15
    fake-block: "LIGHT_BLUE_STAINED_GLASS"
    particle: "REDSTONE"
    particle-red: 90
    particle-green: 220
    particle-blue: 255

